# This is a Databricks asset bundle definition for finnhub-pipeline.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: finnhub-pipeline

targets:
  dev_feature:
    mode: development
    default: true
    workspace:
      host: https://dbc-85dd8f04-671b.cloud.databricks.com

    resources:
      jobs:
        finnhub-pipeline:
          name: "data_pipeline_master"
          tasks:
          # Dataset Generation --------------------
            - task_key: "data_generation_task"
              environment_key: "serverless_env"
              python_wheel_task:
                package_name: "pipelines"
                entry_point: "etl_pipeline"
                parameters:
                  - "pipelines.data_pipeline.raw.test"
                  - "--env"
                  - "dev"
                  - "--space"
                  - "feature"

          # Serverless environment config (serverless, libraries go in environments.spec.dependencies)
          environments:
            - environment_key: "serverless_env"
              spec:
                client: "1"  # Required for serverless compute
                dependencies:
                  - ./dist/*.whl  # Wheel library specified here for serverless
          timeout_seconds: 3600

  prod_release:
    mode: production
    default: true
    workspace:
      host: https://dbc-85dd8f04-671b.cloud.databricks.com

    resources:
      jobs:
        finnhub-pipeline:
          name: "data_pipeline_master"
          tasks:
          # Dataset Generation --------------------
            - task_key: "data_generation_task"
              environment_key: "serverless_env"
              python_wheel_task:
                package_name: "pipelines"
                entry_point: "etl_pipeline"
                parameters:
                  - "pipelines.data_pipeline.raw.test"
                  - "--env"
                  - "dev"
                  - "--space"
                  - "feature"

          # Serverless environment config (serverless, libraries go in environments.spec.dependencies)
          environments:
            - environment_key: "serverless_env"
              spec:
                client: "1"  # Required for serverless compute
                dependencies:
                  - ./dist/*.whl  # Wheel library specified here for serverless
          timeout_seconds: 3600

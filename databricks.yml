# This is a Databricks asset bundle definition for finnhub-pipeline.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: finnhub-pipeline

targets:
  dev_feature:
    mode: development
    default: true
    workspace:
      host: https://dbc-85dd8f04-671b.cloud.databricks.com

    resources:
      jobs:
        finnhub-pipeline:
          name: "finnhub_data_pipeline_master"
          # Schedule the job to run every 5 minutes. 
          # Ensure availableNow=True is set in the tasks, to process all available data and then stop. Allowing the schedule to trigger the next run and reprocess new data.
          # schedule:
          #   quartz_cron_expression: "0 */5 * * * ?" # Every 5 minutes
          #   timezone_id: "UTC"
          #   pause_status: "UNPAUSED"  # Set to "PAUSED" to disable the schedule
          tasks:
            # RAW: Stock Subscriptions --------------------
            - task_key: "stock_subscription_task"
              environment_key: "serverless_env"
              python_wheel_task:
                package_name: "pipelines"
                entry_point: "etl_pipeline"
                parameters:
                  - "pipelines.data_pipeline.raw.stream_finnhub_to_kafka"
                  - "--env"
                  - "dev"
                  - "--space"
                  - "feature"
            # BRONZE: Data Ingestion and Transformation ---------------------------------------------
            - task_key: "data_ingestion_task"
              environment_key: "serverless_env"
              # depends_on:
              #   - task_key: "stock_subscription_task"
              python_wheel_task:
                package_name: "pipelines"
                entry_point: "etl_pipeline"
                parameters:
                  - "pipelines.data_pipeline.bronze.kafka_bronze_ingestion"
                  - "--env"
                  - "dev"
                  - "--space"
                  - "feature"
            - task_key: "data_transformation_task"
              environment_key: "serverless_env"
              depends_on:
                - task_key: "data_ingestion_task"
              python_wheel_task:
                package_name: "pipelines"
                entry_point: "etl_pipeline"
                parameters:
                  - "pipelines.data_pipeline.bronze.transform_data_task"
                  - "--env"
                  - "dev"
                  - "--space"
                  - "feature"
            # SILVER: Data Cleaning ---------------------------------------------
            - task_key: "data_cleaning_task"
              environment_key: "serverless_env"
              depends_on:
                - task_key: "data_transformation_task"
              python_wheel_task:
                package_name: "pipelines"
                entry_point: "etl_pipeline"
                parameters:
                  - "pipelines.data_pipeline.silver.clean_data_task"
                  - "--env"
                  - "dev"
                  - "--space"
                  - "feature"
            # GOLD: Pre-Aggregated data into OHLCV (Open, High, Low, Close, Volume) --------------------
            - task_key: "data_ohlcv_task"
              environment_key: "serverless_env"
              depends_on:
                - task_key: "data_cleaning_task"
              python_wheel_task:
                package_name: "pipelines"
                entry_point: "etl_pipeline"
                parameters:
                  - "pipelines.data_pipeline.gold.ohlcv_data_task"
                  - "--env"
                  - "dev"
                  - "--space"
                  - "feature"

          # Serverless environment config (serverless, libraries go in environments.spec.dependencies)
          environments:
            - environment_key: "serverless_env"
              spec:
                client: "1"  # Required for serverless compute
                dependencies:
                  - ./dist/*.whl  # Wheel library specified here for serverless
          timeout_seconds: 3600
  
  # ------------------------------------------------------------------------------------------------------------------------
  prod_release:
    mode: production
    default: true
    workspace:
      host: https://dbc-85dd8f04-671b.cloud.databricks.com

    resources:
      jobs:
        finnhub-pipeline:
          name: "data_pipeline_master"
          tasks:
          # Dataset Generation --------------------
            - task_key: "data_generation_task"
              environment_key: "serverless_env"
              python_wheel_task:
                package_name: "pipelines"
                entry_point: "etl_pipeline"
                parameters:
                  - "pipelines.data_pipeline.raw.test"
                  - "--env"
                  - "dev"
                  - "--space"
                  - "feature"

          # Serverless environment config (serverless, libraries go in environments.spec.dependencies)
          environments:
            - environment_key: "serverless_env"
              spec:
                client: "1"  # Required for serverless compute
                dependencies:
                  - ./dist/*.whl  # Wheel library specified here for serverless
          timeout_seconds: 3600
